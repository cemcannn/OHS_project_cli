<div class="sidebar-wrapper">
  <aside class="left-sidebar">

    <!-- Sidebar Header -->
    <div class="sidebar-header">
      <a class="sidebar-brand" routerLink="/admin">
        <img src="assets/images/logo-tki.png" alt="TKİ Logo" class="sidebar-brand-logo" />
        <div class="sidebar-brand-text">
          <span class="brand-title">Admin Panel</span>
          <span class="brand-subtitle">OHS Program</span>
        </div>
      </a>
    </div>

    <!-- Sidebar Navigation -->
    <div class="scroll-sidebar">
      <nav class="sidebar-nav">
        <ul class="sidebar-menu">

          <li class="sidebar-item">
            <a class="sidebar-link" routerLink="/admin" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
              <i class="mdi mdi-view-dashboard"></i>
              <span>Ana Sayfa</span>
            </a>
          </li>

          <li class="sidebar-item">
            <a class="sidebar-link" routerLink="definition" routerLinkActive="active">
              <i class="mdi mdi-book-open-variant"></i>
              <span>Tanımlamalar</span>
            </a>
          </li>

          <li class="sidebar-item">
            <a class="sidebar-link" routerLink="authorize-menu" routerLinkActive="active">
              <i class="mdi mdi-fingerprint"></i>
              <span>Yetkilendirme</span>
            </a>
          </li>

          <li class="sidebar-item">
            <a class="sidebar-link" routerLink="roles" routerLinkActive="active">
              <i class="mdi mdi-account-check"></i>
              <span>Rol Sayfası</span>
            </a>
          </li>

          <li class="sidebar-item">
            <a class="sidebar-link" routerLink="users" routerLinkActive="active">
              <i class="mdi mdi-account-group"></i>
              <span>Kullanıcılar</span>
            </a>
          </li>

          <li class="sidebar-item">
            <a class="sidebar-link" routerLink="audit-log" routerLinkActive="active">
              <i class="mdi mdi-history"></i>
              <span>İşlem Logları</span>
            </a>
          </li>

          <li class="sidebar-item">
            <a class="sidebar-link" routerLink="/">
              <i class="mdi mdi-exit-to-app"></i>
              <span>Siteye Dön</span>
            </a>
          </li>

        </ul>
      </nav>
    </div>

  </aside>
</div>
