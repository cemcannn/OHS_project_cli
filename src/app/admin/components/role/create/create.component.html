<div class="create-form">
  <mat-form-field appearance="outline" class="role-field">
    <mat-label>Rol Adı</mat-label>
    <input matInput #txtName placeholder="Rol adını girin">
    <mat-icon matSuffix class="field-icon">account-check</mat-icon>
  </mat-form-field>

  <button mat-raised-button class="create-btn" (click)="create(txtName)">
    <i class="mdi mdi-plus"></i>
    Rol Ekle
  </button>
</div>
