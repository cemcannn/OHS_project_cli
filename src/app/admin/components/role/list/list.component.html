<div class="role-list">
  <table mat-table [dataSource]="dataSource" class="role-table">

    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Rol Adı</th>
      <td mat-cell *matCellDef="let element">
        <span class="role-name">
          <i class="mdi mdi-shield-outline"></i>
          {{ element.name }}
        </span>
      </td>
    </ng-container>

    <ng-container matColumnDef="edit">
      <th mat-header-cell *matHeaderCellDef class="action-header">Düzenle</th>
      <td mat-cell *matCellDef="let element" class="action-cell">
        <button mat-icon-button class="action-btn edit-btn" title="Düzenle">
          <i class="mdi mdi-pencil"></i>
        </button>
      </td>
    </ng-container>

    <ng-container matColumnDef="delete">
      <th mat-header-cell *matHeaderCellDef class="action-header">Sil</th>
      <td mat-cell *matCellDef="let element" class="action-cell"
          appDelete
          [id]="element.id"
          (callback)="getRoles()"
          controller="roles">
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>

  <mat-paginator (page)="pageChanged()"
                 [pageSizeOptions]="[5, 10, 20]"
                 showFirstLastButtons>
  </mat-paginator>
</div>
