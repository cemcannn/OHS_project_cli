<div class="auth-page">
  <div class="auth-container">

    <div class="auth-logo">
      <i class="mdi mdi-hard-hat"></i>
      <h1>OHS Program</h1>
      <p>İş Güvenliği Yönetim Sistemi</p>
    </div>

    <div class="auth-card">
      <div class="auth-card-header">
        <i class="mdi mdi-login-variant"></i>
        <h2>Kullanıcı Girişi</h2>
      </div>

      <div class="auth-card-body">

        <div class="auth-form-field">
          <label>Kullanıcı Adı veya Email</label>
          <div class="auth-input-wrapper">
            <i class="mdi mdi-account auth-input-icon"></i>
            <input #txtUsernameOrEmail type="text" class="auth-input" placeholder="Kullanıcı adı veya e-posta giriniz">
          </div>
        </div>

        <div class="auth-form-field">
          <label>Şifre</label>
          <div class="auth-input-wrapper">
            <i class="mdi mdi-lock auth-input-icon"></i>
            <input #txtPassword type="password" class="auth-input" placeholder="Şifrenizi giriniz">
          </div>
        </div>

        <button class="auth-btn" (click)="login(txtUsernameOrEmail.value, txtPassword.value)">
          <i class="mdi mdi-login"></i>
          Giriş Yap
        </button>

        <ngx-spinner size="default" name="s1" type="cog"></ngx-spinner>

      </div>
    </div>

    <!-- Register Link -->
    <div class="auth-register-box">
      <span class="auth-register-text">Hesabınız yok mu?</span>
      <a routerLink="/register" class="auth-register-link">
        <i class="mdi mdi-account-plus"></i>
        Yeni Kullanıcı Oluştur
      </a>
    </div>

  </div>
</div>
