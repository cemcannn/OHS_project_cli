<div class="auth-page">
  <div class="auth-container">

    <div class="auth-logo">
      <i class="mdi mdi-hard-hat"></i>
      <h1>OHS Program</h1>
      <p>İş Güvenliği Yönetim Sistemi</p>
    </div>

    <div class="auth-card">
      <div class="auth-card-header">
        <i class="mdi mdi-lock-reset"></i>
        <h2>Şifre Güncelle</h2>
      </div>

      <div class="auth-card-body">

        <div class="auth-form-field">
          <label>Yeni Şifre</label>
          <div class="auth-input-wrapper">
            <i class="mdi mdi-lock auth-input-icon"></i>
            <input type="password" class="auth-input" placeholder="Yeni şifrenizi giriniz" #txtPassword>
          </div>
        </div>

        <div class="auth-form-field">
          <label>Şifre Tekrar</label>
          <div class="auth-input-wrapper">
            <i class="mdi mdi-lock-check auth-input-icon"></i>
            <input type="password" class="auth-input" placeholder="Şifrenizi tekrar giriniz" #txtPasswordConfirm>
          </div>
        </div>

        <button type="button" class="auth-btn" (click)="updatePassword(txtPassword.value, txtPasswordConfirm.value)">
          <i class="mdi mdi-content-save"></i>
          Şifreyi Güncelle
        </button>

      </div>
    </div>

  </div>
</div>
