<div class="sidebar-wrapper">
  <aside class="left-sidebar">

    <!-- Sidebar Header / Logo -->
    <div class="sidebar-header">
      <div class="sidebar-brand">
        <img src="assets/images/logo-tki.png" alt="TKİ Logo" class="sidebar-brand-logo" />
        <div class="sidebar-brand-text">
          <span class="brand-title">OHS Program</span>
          <span class="brand-subtitle">İş Güvenliği</span>
        </div>
      </div>
    </div>

    <!-- Sidebar Navigation -->
    <div class="scroll-sidebar">
      <nav class="sidebar-nav">
        <ul class="sidebar-menu">

          <li class="sidebar-item">
            <a class="sidebar-link" routerLink="" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
              <i class="mdi mdi-view-dashboard"></i>
              <span>Ana Sayfa</span>
            </a>
          </li>

          <li class="sidebar-item">
            <a class="sidebar-link" routerLink="accident" routerLinkActive="active">
              <i class="mdi mdi-alert"></i>
              <span>İş Kazaları</span>
            </a>
          </li>

          <li class="sidebar-item">
            <a class="sidebar-link" routerLink="personnel" routerLinkActive="active">
              <i class="mdi mdi-account-multiple"></i>
              <span>Personel</span>
            </a>
          </li>

          <li class="sidebar-item">
            <a class="sidebar-link" routerLink="monthly-directorate-data" routerLinkActive="active">
              <i class="mdi mdi-library-plus"></i>
              <span>Aylık İşletme Verileri</span>
            </a>
          </li>

          <li class="sidebar-item">
            <a class="sidebar-link" routerLink="accident-statistic" routerLinkActive="active">
              <i class="mdi mdi-calculator"></i>
              <span>Kaza İstatistikleri</span>
            </a>
          </li>

          <li class="sidebar-item">
            <a class="sidebar-link" routerLink="accident-rate" routerLinkActive="active">
              <i class="mdi mdi-medical-bag"></i>
              <span>Kaza Geçiren Çalışan</span>
            </a>
          </li>

          <li class="sidebar-item">
            <a class="sidebar-link" routerLink="chart" routerLinkActive="active">
              <i class="mdi mdi-chart-areaspline"></i>
              <span>Grafikler</span>
            </a>
          </li>

          <li class="sidebar-item">
            <a class="sidebar-link" routerLink="accident-analysis" routerLinkActive="active">
              <i class="mdi mdi-chart-bar"></i>
              <span>Kaza Analizi</span>
            </a>
          </li>

          <li class="sidebar-item">
            <a class="sidebar-link" routerLink="data-import" routerLinkActive="active">
              <i class="mdi mdi-database-import-outline"></i>
              <span>Veri Güncelle</span>
            </a>
          </li>

          <li class="sidebar-item" *ngIf="authService.isAuthenticated">
            <a class="sidebar-link" routerLink="admin" routerLinkActive="active">
              <i class="mdi mdi-shield-account"></i>
              <span>Admin</span>
            </a>
          </li>

        </ul>
      </nav>
    </div>

  </aside>
</div>
