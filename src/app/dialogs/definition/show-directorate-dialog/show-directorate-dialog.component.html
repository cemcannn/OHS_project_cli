<div class="dlg-wrapper">

  <div class="dlg-header" style="--c1:#8e44ad; --c2:#6c3483">
    <div class="dlg-header-left">
      <i class="mdi mdi-factory dlg-icon"></i>
      <div>
        <h2>İşletmeler</h2>
        <p>İşletme ve müdürlük tanımlamalarını yönetin</p>
      </div>
    </div>
    <button mat-icon-button class="dlg-close" mat-dialog-close>
      <i class="mdi mdi-close"></i>
    </button>
  </div>

  <div class="dlg-search">
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Ara</mat-label>
      <input matInput (keyup)="applyFilter($event)" placeholder="İşletme ara...">
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>
    <span class="record-badge">{{ dataSource.filteredData.length }} kayıt</span>
  </div>

  <div class="dlg-table-wrap">
    <table mat-table [dataSource]="dataSource" matSort class="dlg-table">

      <ng-container matColumnDef="directorate">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>İşletme Adı</th>
        <td mat-cell *matCellDef="let element; let i = index">
          <ng-container *ngIf="editIndex === i; else readMode">
            <mat-form-field appearance="outline" class="inline-field">
              <mat-label>Ad</mat-label>
              <input matInput [(ngModel)]="element.name">
            </mat-form-field>
          </ng-container>
          <ng-template #readMode>
            <div class="cell-name">{{ element.name }}</div>
          </ng-template>
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>İşlemler</th>
        <td mat-cell *matCellDef="let element; let i = index">
          <ng-container *ngIf="editIndex === i; else viewActions">
            <button mat-icon-button class="action-btn save-btn" (click)="saveEdit(element)" title="Kaydet">
              <i class="mdi mdi-check"></i>
            </button>
            <button mat-icon-button class="action-btn cancel-btn" (click)="cancelEdit()" title="İptal">
              <i class="mdi mdi-close"></i>
            </button>
          </ng-container>
          <ng-template #viewActions>
            <button mat-icon-button class="action-btn edit-btn" (click)="startEdit(i)" *ngIf="!data.isPicker" title="Düzenle">
              <i class="mdi mdi-pencil"></i>
            </button>
            <button mat-icon-button class="action-btn delete-btn" appDelete [id]="element.id" (callback)="showDirectorates()" controller="directorates" *ngIf="!data.isPicker">
            </button>
            <button mat-icon-button class="action-btn select-btn" (click)="selectDirectorate(element)" *ngIf="data.isPicker" title="Seç">
              <i class="mdi mdi-check-circle-outline"></i>
            </button>
          </ng-template>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"
          [class.row-picker]="data.isPicker"
          (click)="data.isPicker && selectDirectorate(row)"></tr>
    </table>
  </div>

  <mat-paginator [pageSizeOptions]="[10, 25, 50]" showFirstLastButtons></mat-paginator>

  <div class="dlg-add-section" *ngIf="!data.isPicker">
    <div class="dlg-add-title">
      <i class="mdi mdi-plus-circle"></i> Yeni İşletme Ekle
    </div>
    <div class="dlg-add-fields">
      <mat-form-field appearance="outline" class="add-field">
        <mat-label>İşletme Adı</mat-label>
        <input matInput [(ngModel)]="newDirectorate" placeholder="Ad girin">
      </mat-form-field>
    </div>
    <button mat-raised-button class="dlg-add-btn" (click)="createDirectorate()">
      <i class="mdi mdi-plus"></i> Ekle
    </button>
  </div>

</div>
