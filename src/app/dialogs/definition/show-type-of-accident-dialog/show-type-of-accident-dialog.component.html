<div class="dlg-wrapper">

  <!-- Header -->
  <div class="dlg-header" style="--c1:#c0392b; --c2:#a93226">
    <div class="dlg-header-left">
      <i class="mdi mdi-alert-circle dlg-icon"></i>
      <div>
        <h2>Kaza Türleri</h2>
        <p>Kaza türü tanımlamalarını yönetin</p>
      </div>
    </div>
    <button mat-icon-button class="dlg-close" mat-dialog-close>
      <i class="mdi mdi-close"></i>
    </button>
  </div>

  <!-- Search -->
  <div class="dlg-search">
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Ara</mat-label>
      <input matInput (keyup)="applyFilter($event)" placeholder="Kaza türü ara...">
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>
    <span class="record-badge">{{ dataSource.filteredData.length }} kayıt</span>
  </div>

  <!-- Table -->
  <div class="dlg-table-wrap">
    <table mat-table [dataSource]="dataSource" matSort class="dlg-table">

      <ng-container matColumnDef="code">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Kod</th>
        <td mat-cell *matCellDef="let element; let i = index">
          <ng-container *ngIf="editIndex === i; else readMode">
            <mat-form-field appearance="outline" class="inline-field">
              <mat-label>Kod</mat-label>
              <input matInput [(ngModel)]="element.code" placeholder="Kod girin">
            </mat-form-field>
          </ng-container>
          <ng-template #readMode>
            {{ element.code || '-' }}
          </ng-template>
        </td>
      </ng-container>

      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Ad</th>
        <td mat-cell *matCellDef="let element; let i = index">
          <ng-container *ngIf="editIndex === i; else nameReadMode">
            <mat-form-field appearance="outline" class="inline-field">
              <mat-label>Ad</mat-label>
              <input matInput [(ngModel)]="element.name">
            </mat-form-field>
          </ng-container>
          <ng-template #nameReadMode>
            <div class="cell-name">{{ element.name }}</div>
          </ng-template>
        </td>
      </ng-container>

      <ng-container matColumnDef="description">
        <th mat-header-cell *matHeaderCellDef>Açıklama</th>
        <td mat-cell *matCellDef="let element; let i = index">
          <ng-container *ngIf="editIndex === i; else descReadMode">
            <mat-form-field appearance="outline" class="inline-field">
              <mat-label>Açıklama</mat-label>
              <input matInput [(ngModel)]="element.plainDescription">
            </mat-form-field>
          </ng-container>
          <ng-template #descReadMode>
            <div class="cell-desc" *ngIf="element.plainDescription">{{ element.plainDescription }}</div>
            <div class="cell-desc" *ngIf="!element.plainDescription">-</div>
          </ng-template>
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>İşlemler</th>
        <td mat-cell *matCellDef="let element; let i = index">
          <ng-container *ngIf="editIndex === i; else viewActions">
            <button mat-icon-button class="action-btn save-btn" (click)="saveEdit(element)" title="Kaydet">
              <i class="mdi mdi-check"></i>
            </button>
            <button mat-icon-button class="action-btn cancel-btn" (click)="cancelEdit()" title="İptal">
              <i class="mdi mdi-close"></i>
            </button>
          </ng-container>
          <ng-template #viewActions>
            <button mat-icon-button class="action-btn edit-btn" (click)="startEdit(i)" *ngIf="!data.isPicker" title="Düzenle">
              <i class="mdi mdi-pencil"></i>
            </button>
            <button mat-icon-button class="action-btn delete-btn" appDelete [id]="element.id" (callback)="showTypeOfAccidents()" controller="typeOfAccidents" *ngIf="!data.isPicker">
            </button>
            <button mat-icon-button class="action-btn select-btn" (click)="selectTypeOfAccident(element)" *ngIf="data.isPicker" title="Seç">
              <i class="mdi mdi-check-circle-outline"></i>
            </button>
          </ng-template>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"
          [class.row-picker]="data.isPicker"
          (click)="data.isPicker && selectTypeOfAccident(row)"></tr>
    </table>
  </div>

  <mat-paginator [pageSizeOptions]="[10, 25, 50]" showFirstLastButtons></mat-paginator>

  <!-- Add New -->
  <div class="dlg-add-section" *ngIf="!data.isPicker">
    <div class="dlg-add-title">
      <i class="mdi mdi-plus-circle"></i> Yeni Kaza Türü Ekle
    </div>
    <div class="dlg-add-fields">
      <mat-form-field appearance="outline" class="add-field">
        <mat-label>Kod</mat-label>
        <input matInput [(ngModel)]="newTypeOfAccidentCode" placeholder="Kod girin">
      </mat-form-field>
      <mat-form-field appearance="outline" class="add-field">
        <mat-label>Kaza Türü Adı</mat-label>
        <input matInput [(ngModel)]="newTypeOfAccident" placeholder="Ad girin">
      </mat-form-field>
      <mat-form-field appearance="outline" class="add-field desc-field">
        <mat-label>Açıklama</mat-label>
        <input matInput [(ngModel)]="newTypeOfAccidentDescription" placeholder="Kısa açıklama">
      </mat-form-field>
    </div>
    <button mat-raised-button class="dlg-add-btn" (click)="createTypeOfAccident()">
      <i class="mdi mdi-plus"></i> Ekle
    </button>
  </div>

</div>
