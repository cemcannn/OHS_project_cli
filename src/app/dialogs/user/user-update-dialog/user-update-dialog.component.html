<div class="dlg-wrapper">

  <!-- Header -->
  <div class="dlg-header">
    <div class="dlg-header-left">
      <i class="mdi mdi-account-edit dlg-icon"></i>
      <div>
        <h2>Kullanıcı Bilgilerini Güncelle</h2>
        <p>Hesap bilgilerinizi düzenleyin</p>
      </div>
    </div>
    <button mat-icon-button class="dlg-close" (click)="close()">
      <i class="mdi mdi-close"></i>
    </button>
  </div>

  <!-- Content -->
  <div class="dlg-content">
    <form [formGroup]="userForm">

      <mat-form-field appearance="outline" class="form-field">
        <mat-label>Ad Soyad</mat-label>
        <input matInput formControlName="name" placeholder="Ad ve soyadınız">
        <mat-error *ngIf="userForm.get('name')?.hasError('required')">İsim gereklidir.</mat-error>
        <mat-error *ngIf="userForm.get('name')?.hasError('minlength')">En az 2 karakter giriniz.</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="form-field">
        <mat-label>Kullanıcı Adı</mat-label>
        <input matInput formControlName="userName" placeholder="Kullanıcı adınız">
        <mat-error *ngIf="userForm.get('userName')?.hasError('required')">Kullanıcı adı gereklidir.</mat-error>
        <mat-error *ngIf="userForm.get('userName')?.hasError('invalidUsername')">Geçerli bir kullanıcı adı giriniz.</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="form-field">
        <mat-label>E-posta Adresi</mat-label>
        <input matInput formControlName="email" placeholder="E-posta adresiniz">
        <mat-error *ngIf="userForm.get('email')?.hasError('required')">E-posta gereklidir.</mat-error>
        <mat-error *ngIf="userForm.get('email')?.hasError('invalidEmail')">Geçerli bir e-posta adresi giriniz.</mat-error>
      </mat-form-field>

    </form>
  </div>

  <!-- Footer -->
  <div class="dlg-footer">
    <button mat-stroked-button class="footer-cancel" (click)="close()">
      <i class="mdi mdi-close"></i> İptal
    </button>
    <button mat-raised-button class="footer-submit" [disabled]="userForm.invalid" (click)="updateUser()">
      <i class="mdi mdi-content-save"></i> Güncelle
    </button>
  </div>

</div>
