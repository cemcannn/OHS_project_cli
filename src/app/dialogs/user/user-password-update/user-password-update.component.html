<div class="dlg-wrapper">

  <!-- Header -->
  <div class="dlg-header">
    <div class="dlg-header-left">
      <i class="mdi mdi-lock-reset dlg-icon"></i>
      <div>
        <h2>Şifre Güncelle</h2>
        <p>Hesap şifrenizi değiştirin</p>
      </div>
    </div>
    <button mat-icon-button class="dlg-close" (click)="close()">
      <i class="mdi mdi-close"></i>
    </button>
  </div>

  <!-- Content -->
  <div class="dlg-content">
    <form [formGroup]="passwordForm">

      <div class="section-title">
        <i class="mdi mdi-shield-lock-outline"></i>
        Mevcut Şifre
      </div>

      <mat-form-field appearance="outline" class="form-field">
        <mat-label>Mevcut Şifre</mat-label>
        <input matInput type="password" formControlName="currentPassword" placeholder="Mevcut şifrenizi giriniz">
        <mat-error *ngIf="passwordForm.get('currentPassword')?.hasError('required')">Mevcut şifre gereklidir.</mat-error>
      </mat-form-field>

      <div class="section-title" style="margin-top: 12px;">
        <i class="mdi mdi-lock-outline"></i>
        Yeni Şifre
      </div>

      <mat-form-field appearance="outline" class="form-field">
        <mat-label>Yeni Şifre</mat-label>
        <input matInput type="password" formControlName="password" placeholder="Yeni şifrenizi giriniz">
        <mat-error *ngIf="passwordForm.get('password')?.hasError('required')">Yeni şifre gereklidir.</mat-error>
        <mat-error *ngIf="passwordForm.get('password')?.hasError('strongPassword')">
          En az 8 karakter, 1 büyük harf, 1 küçük harf, 1 rakam ve 1 özel karakter içermelidir.
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="form-field">
        <mat-label>Yeni Şifre Tekrar</mat-label>
        <input matInput type="password" formControlName="passwordConfirm" placeholder="Yeni şifrenizi tekrar giriniz">
        <mat-error *ngIf="passwordForm.get('passwordConfirm')?.hasError('required')">Şifre tekrarı gereklidir.</mat-error>
        <mat-error *ngIf="passwordForm.get('passwordConfirm')?.hasError('passwordMatch')">Şifreler eşleşmiyor.</mat-error>
      </mat-form-field>

    </form>
  </div>

  <!-- Footer -->
  <div class="dlg-footer">
    <button mat-stroked-button class="footer-cancel" (click)="close()">
      <i class="mdi mdi-close"></i> İptal
    </button>
    <button mat-raised-button class="footer-submit" [disabled]="passwordForm.invalid" (click)="updatePassword()">
      <i class="mdi mdi-content-save"></i> Şifreyi Güncelle
    </button>
  </div>

</div>
